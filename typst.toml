[package]
name = "powergretz"
version = "0.1.0"
compiler = "0.13.1"
entrypoint = "src/lib.typ"
authors = ["langestefan"]
license = "MIT"
description = "Draw power-system single-line diagrams (SLDs) in Typst, on top of CeTZ."
repository = "https://github.com/langestefan/powergretz"
categories = ["visualization", "components"]
disciplines = ["engineering"]
keywords = [
  "power",
  "grid",
  "sld",
  "single-line",
  "cetz",
  "electrical",
  "substation",
  "transformer",
  "busbar",
]
exclude = [
  "docs",
  "examples",
  "tests",
  ".github",
  ".gitignore",
]
