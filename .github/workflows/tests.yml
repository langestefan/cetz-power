name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Cancel superseded PR runs so a force-push doesn't queue up duplicate work,
# but let main-branch runs complete in order.
concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  typst:
    name: Typst tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Typst
        uses: typst-community/setup-typst@v4

      - name: Run test suite
        run: bash ./tests/run.sh

  docs:
    name: Docs build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@v4

      # Needed at build time to compile every Typst snippet under
      # docs/snippets/ to SVG (build:diagrams runs before astro build).
      - name: Install Typst
        uses: typst-community/setup-typst@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build site (snippets → SVG, then astro build)
        run: npm run build
